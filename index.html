<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PGINHS Student Document Request Form</title>
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a1f44; /* Dark blue background */
    min-height: 100vh;
    padding: 40px 20px;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Form container */
form {
    background: linear-gradient(135deg, #FFF8B5, #B3D9FF); /* Pastel gradient */
    padding: 40px 30px 30px 30px;
    border-radius: 20px;
    max-width: 650px;
    width: 100%;
    box-sizing: border-box;
    color: #0a1f44;
    position: relative;
}

/* Simple professional title */
form h2 {
    text-align: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 24px;
    font-weight: bold;
    color: #0a1f44;
    margin-bottom: 25px;
}

/* Inputs, selects, textareas */
input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid #0a1f44; /* Dark blue border */
    box-sizing: border-box;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
    color: #0a1f44;
}

/* Buttons */
button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 10px;
    border: 2px solid #0a1f44;
    background: linear-gradient(45deg, #A2D5F2, #FFF5BA);
    color: #0a1f44;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.25s ease;
}
button:hover {
    background: linear-gradient(45deg, #8AC4E9, #FFF1A8);
}

/* Tracking form button below the form box */
.status-link {
    display: block;
    text-align: center;
    margin: 15px auto 10px auto;
    padding: 14px;
    background: linear-gradient(45deg, #FFA500, #FFD700);
    color: #0a1f44;
    text-decoration: none;
    border-radius: 12px;
    max-width: 650px;
    font-weight: bold;
    transition: all 0.25s ease;
}
.status-link:hover {
    background: linear-gradient(45deg, #FFD700, #FFA500);
}

/* Homepage button below the tracking button */
.homepage-link {
    display: block;
    text-align: center;
    margin: 10px auto 0 auto;
    padding: 14px;
    background: linear-gradient(45deg, #FFA500, #FFD700);
    color: #0a1f44;
    text-decoration: none;
    border-radius: 12px;
    max-width: 650px;
    font-weight: bold;
    transition: all 0.25s ease;
}
.homepage-link:hover {
    background: linear-gradient(45deg, #FFD700, #FFA500);
}

/* LOGIN MODAL */
#loginModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,.7);
    justify-content: center;
    align-items: center;
}
.modal-box {
    background: linear-gradient(135deg, #FFF8B5, #B3D9FF);
    padding: 25px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
}
.modal-box input {
    width: 90%;
    margin: 10px auto;
}
.modal-box button {
    width: 90%;
}
#loginError {
    color: red;
    margin-top: 8px;
}

/* Responsive */
@media screen and (max-width: 400px){
    form { padding: 30px 15px 20px 15px; }
    input, button { padding: 12px; font-size: 14px; }
    form h2 { font-size: 20px; }
}
</style>
</head>
<body>

<form id="requestForm" action="https://formsubmit.co/pginhsrequest@gmail.com" method="POST">
    <h2>PGINHS Student Document Request Form</h2>

    <input type="hidden" name="_captcha" value="false">
    <input type="text" name="first_name" placeholder="First Name" required>
    <input type="text" name="middle_name" placeholder="Middle Name" required>
    <input type="text" name="last_name" placeholder="Last Name" required>
    <input type="text" name="student_address" placeholder="Address" required>
    <input type="text" name="student_sex" placeholder="Sex" required>
    <input id="studentEmail" type="email" name="student_email" placeholder="Student Email" required>
    <input type="text" name="student_lrn" placeholder="Student LRN" required>

    <label>Grade Level:</label>
    <select name="grade_level" required>
        <option value="">--Select Grade Level--</option>
        <option value="Grade 7">Grade 7</option>
        <option value="Grade 8">Grade 8</option>
        <option value="Grade 9">Grade 9</option>
        <option value="Grade 10">Grade 10</option>
        <option value="Grade 11">Grade 11</option>
        <option value="Grade 12">Grade 12</option>
        <option value="Alumni of PGINHS">Alumni of PGINHS</option>
    </select>

    <textarea name="grade7_info" placeholder="If Grade 7 student, please add your full name and relationship with the student. If not, put N/A." required></textarea>
    
    <input type="text" name="section" placeholder="Section" required>
    <input type="tel" name="student_phone" placeholder="Phone Number" required>
    <input type="text" name="tracking_code" placeholder="Tracking Code" required>
    
    <label>Type of Document:</label>
    <select name="document_type" required>
        <option value="">--Select Document--</option>
        <option value="Certificate of Enrollment">Certificate of Enrollment</option>
        <option value="Certificate of General Weighted Average (GWA)">Certificate of General Weighted Average (GWA)</option>
        <option value="Certificate of Graduation">Certificate of Graduation</option>
        <option value="Certificate of Grades">Certificate of Grades</option>
        <option value="Certificate of Honors">Certificate of Honors</option>
        <option value="Certificate of No Pending Case">Certificate of No Pending Case</option>
        <option value="Certificate of Ranking">Certificate of Ranking</option>
        <option value="Certified True Copy of Diploma">Certified True Copy of Diploma</option>
        <option value="Certified True Copy of Records">Certified True Copy of Records</option>
        <option value="Form 137 / Permanent Record (SF10)">Form 137 / Permanent Record (SF10)</option>
        <option value="Honorable Dismissal / Transfer Credentials">Honorable Dismissal / Transfer Credentials</option>
        <option value="Letter of Recommendation">Letter of Recommendation</option>
        <option value="Permit to Transfer">Permit to Transfer</option>
        <option value="Transcript of Records (TOR)">Transcript of Records (TOR)</option>
        <option value="Verification / Authentication (CAV)">Verification / Authentication (CAV)</option>
        <option value="Others (specify in additional information box)">Others</option>
    </select>
    
    <textarea name="additional_info" placeholder="Additional information regarding your request" required></textarea>
    <textarea name="purpose" placeholder="Purpose of the Request (Required for your request to be processed)" required></textarea>
    
    <a class="status-link" href="https://docs.google.com/forms/d/e/1FAIpQLSdioEUSx0ewG7ctsIQU2kKJojM7psuOITkX71Lj6oI24o-ilw/viewform?usp=dialog" target="_blank">
        Form for Tracking your Document
        </a>
    <button type="submit">Send Request</button>
</form>
</a>
<!-- Homepage button below the tracking button -->
<a class="homepage-link" href="https://pginhsrequest.wordpress.com/" target="_blank">
    Go back to Homepage
</a>

<!-- LOGIN POPUP -->
<div id="loginModal">
    <div class="modal-box">
        <h3>Student Login Required</h3>
        <input id="loginEmail" type="email" placeholder="Email">
        <input id="loginPassword" type="password" placeholder="Password">
        <button onclick="loginAndSubmit()">Login & Submit</button>
        <button onclick="closeModal()">Cancel</button>
        <p id="loginError"></p>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyAal-tUtavmqhKDGfY5ETXTanvBoieN304",
    authDomain: "student-document-request-4cd93.firebaseapp.com",
    projectId: "student-document-request-4cd93",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("AEp6caL5vX8Yt2-Ln");

let formToSubmit;
document.getElementById("requestForm").addEventListener("submit", function(e){
    e.preventDefault();
    formToSubmit = this;
    document.getElementById("loginModal").style.display = "flex";
});

function closeModal() {
    document.getElementById("loginModal").style.display = "none";
}

function loginAndSubmit() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value.trim();
    const error = document.getElementById("loginError");

    if(!email || !password){
        error.innerText = "Enter email and password.";
        return;
    }

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            document.getElementById("studentEmail").value = email;
            closeModal();
            emailjs.sendForm('service_kypw3ko','template_5gra4yf',formToSubmit)
                .then(() => formToSubmit.submit())
                .catch(() => formToSubmit.submit());
        })
        .catch(err => {
            error.innerText = err.message;
        });
}
</script>

</body>
</html>
